<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 0;
      font-size: 14px;
      background: #f0f0f0;
    }

    /* ---------- Paper Size Presets ---------- */
    .page {
      position: relative;
      margin: 20px auto;
      background: white;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .a5 {
      width: 559px;
      height: 794px;
    }

    /* 148 × 210 mm */
    .a5.landscape {
      width: 794px;
      height: 559px;
    }

    .a4 {
      width: 794px;
      height: 1122px;
    }

    /* 210 × 297 mm */
    .a4.landscape {
      width: 1122px;
      height: 794px;
    }

    /* ---------- Layout ---------- */
    .header,
    .footer {
      position: absolute;
      left: 0;
      right: 0;
      padding: 0 20px;
    }

    .header {
      top: 0;
      height: 60px;
    }

    .footer {
      bottom: 0;
      height: 50px;
    }

    .content {
      position: absolute;
      top: 60px;
      bottom: 50px;
      left: 0;
      right: 0;
      padding: 0 20px;
    }

    td:nth-child(1) {
      width: 150px;
    }

    /* inside_product column */
    td:nth-child(2) {
      width: 150px;
    }

    /* outside_product column */
    td:nth-child(3) {
      width: 100px;
    }

    /* first_quantity column */
    td:nth-child(4) {
      width: 100px;
    }

    /* second_quantity column */
    td:nth-child(5) {
      width: 100px;
    }

    /* price column */
    td:nth-child(6) {
      width: 120px;
    }

    /* ---------- Field Positions ---------- */
    .field {
      position: absolute;
    }

    .party {
      top: 10px;
      left: 50px;
      font-size: 16px;
      font-weight: bold;
    }

    .date_time {
      top: 10px;
      right: 50px;
    }

    .employee {
      bottom: 10px;
      left: 50px;
    }

    .gross_amount {
      bottom: 10px;
      left: 200px;
    }

    .unit {
      bottom: 10px;
      left: 400px;
    }

    .page-info {
      bottom: 10px;
      right: 50px;
    }

    /* ---------- Table ---------- */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    tr {
      height: 20px;
    }

    td {
      padding: 0 4px;
    }

  </style>
</head>

<body>
  <!-- Set your desired paper size here -->
  <div class="page a5 landscape">
    <!-- or a4 / a4 landscape -->
    <div class="header">
      <span class="field party">{{party}}</span>
      <span class="field date_time">{{date_time}}</span>
    </div>

    <div class="content">
      <table>
        <tbody>
          {{products}}
        </tbody>
      </table>
    </div>

    <div class="footer">
      <span class="field employee">{{employee}}</span>
      <span class="field gross_amount">{{gross_amount}}</span>
      <span class="field unit">{{unit}}</span>
      <span class="field page-info">第{{page}}页 / 共{{total_pages}}页</span>
    </div>
  </div>

<!-- Page settings and rows-per-page configuration -->
 <div id="paper-size" style="display: none;">a5</div>
 <div id="paper-orientation" style="display: none;">landscape</div>
 <div id="rows-per-page" style="display: none;">7</div>
</body>

</html>
